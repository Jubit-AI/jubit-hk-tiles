<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yok-Iso HK — pixel map (dseek.ai/data/life)</title>
  <style>
    /* Parchment ground to match the Yok-Iso HK aesthetic (rice-paper #F3E7CF). */
    html, body { margin: 0; height: 100%; background: #F3E7CF; overflow: hidden; }
    #osd { width: 100vw; height: 100vh; background: #F3E7CF; }
    /* Attribution — REQUIRED by the HK Lands Dept open-data terms. Do not remove. */
    #attribution {
      position: fixed; left: 12px; bottom: 10px; z-index: 10;
      font: 11px/1.4 -apple-system, system-ui, sans-serif;
      color: #5a5145; background: rgba(246, 241, 232, 0.82);
      border: 1px solid #c9c2b6; border-radius: 6px; padding: 6px 10px;
      max-width: 60ch; pointer-events: none;
    }
    #attribution b { color: #1f1a17; }
    #title {
      position: fixed; left: 12px; top: 10px; z-index: 10;
      font: 600 13px/1.2 -apple-system, system-ui, sans-serif; color: #1f1a17;
      background: rgba(246, 241, 232, 0.82); border: 1px solid #c9c2b6;
      border-radius: 6px; padding: 6px 10px; letter-spacing: 0.2px;
    }
    /* Map-mode switcher — pick a baked DZI map. */
    #maps { position: fixed; right: 12px; top: 10px; z-index: 10; display: flex; gap: 6px; }
    #maps button {
      font: 600 12px/1.2 -apple-system, system-ui, sans-serif; color: #1f1a17;
      background: rgba(246, 241, 232, 0.92); border: 1px solid #1f1a17;
      border-radius: 6px; padding: 6px 10px; cursor: pointer; letter-spacing: 0.2px;
    }
    #maps button.active { background: #C7A25B; }
    /* Phase B — weather/time scenario switcher (variants of the Territory map). */
    #scenarios { position: fixed; right: 12px; top: 48px; z-index: 10; display: flex; gap: 6px; }
    #scenarios button {
      font: 600 11px/1.2 -apple-system, system-ui, sans-serif; color: #1f1a17;
      background: rgba(246, 241, 232, 0.92); border: 1px solid #1f1a17;
      border-radius: 6px; padding: 5px 9px; cursor: pointer; letter-spacing: 0.2px;
    }
    #scenarios button.active { background: #C7A25B; }
  </style>
</head>
<body>
  <div id="title">Yok-Iso HK · soft isometric parchment city</div>
  <div id="maps">
    <button data-dzi="central.dzi">Central</button>
    <button data-dzi="hk-island-strip.dzi">HK Island</button>
    <button data-dzi="territory.dzi">Territory</button>
    <button data-dzi="central-hd.dzi" title="Central + Victoria Harbour at 2× detail">Central HD</button>
  </div>
  <div id="scenarios">
    <button data-dzi="territory.dzi" data-scenario="day">Day</button>
    <button data-dzi="territory-golden.dzi" data-scenario="golden">Golden</button>
    <button data-dzi="territory-night.dzi" data-scenario="night">Night</button>
    <button data-dzi="territory-rain.dzi" data-scenario="rain">Rain</button>
    <button data-dzi="territory-typhoon.dzi" data-scenario="typhoon">Typhoon</button>
  </div>
  <div id="osd"></div>
  <div id="attribution">
    Building data © <b>The Government of the Hong Kong SAR (Lands Department)</b>,
    via <b>DATA.GOV.HK</b>. Rendered &amp; stylised by Jubit (Yok-Iso HK).
    Tiles are a derived work; not for resale as a standalone dataset.
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>
  <script>
    // DZI source: ?dzi=<path> (default the bundled Central sample).
    const params = new URLSearchParams(location.search);
    const dzi = params.get("dzi") || "territory.dzi";  // flagship urban-core map
    const viewer = OpenSeadragon({
      id: "osd",
      prefixUrl: "https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/images/",
      tileSources: dzi,
      showNavigator: true,
      navigatorPosition: "BOTTOM_RIGHT",
      backgroundColor: "#F3E7CF",
      minZoomImageRatio: 0.6,
      // Phase C — sharper zoom-in. 3.0 → 5.0 lets the viewer magnify ~5× past
      // native DZI res before it softens (the 24576×16384 territory bake sets the
      // crisp ceiling). imageSmoothingEnabled:false keeps the extra zoom crisp,
      // not blurry. Pair with per-region detail DZIs (hero districts) for true
      // extra detail beyond this.
      maxZoomPixelRatio: 5.0,
      gestureSettingsMouse: { clickToZoom: false },
      // pixel-art-friendly: keep edges crisp when zoomed past native res
      imageSmoothingEnabled: false,
    });
    // Map-mode switcher — swap between the baked DZI maps in place.
    const mapBtns = [...document.querySelectorAll("#maps button")];
    const scenBtns = [...document.querySelectorAll("#scenarios button")];
    const setMapActive = (d) => mapBtns.forEach((b) => b.classList.toggle("active", b.dataset.dzi === d));
    const setScenActive = (d) => scenBtns.forEach((b) => b.classList.toggle("active", b.dataset.dzi === d));
    // Weather/time scenarios are variants of the Territory map only — they're
    // enabled when Territory is the active base, disabled (greyed) otherwise.
    const territoryActive = (d) => d.startsWith("territory");
    const syncScenAvail = (d) => scenBtns.forEach((b) => (b.disabled = !territoryActive(d)));

    mapBtns.forEach((b) => b.addEventListener("click", () => {
      const d = b.dataset.dzi;
      viewer.open(d); setMapActive(d); syncScenAvail(d);
      setScenActive(territoryActive(d) ? "territory.dzi" : null); // base map = Day
    }));
    scenBtns.forEach((b) => b.addEventListener("click", () => {
      const d = b.dataset.dzi;
      viewer.open(d); setScenActive(d); setMapActive("territory.dzi");
    }));

    // Graceful fallback: a scenario variant DZI may not be generated yet. If an
    // open fails, drop back to the day Territory map instead of a blank viewer.
    viewer.addHandler("open-failed", (e) => {
      console.warn("DZI open failed:", e && e.message, "→ falling back to territory.dzi");
      if (viewer.tileSources !== "territory.dzi") {
        viewer.open("territory.dzi"); setMapActive("territory.dzi"); setScenActive("territory.dzi");
      }
    });

    setMapActive(dzi); syncScenAvail(dzi); setScenActive(territoryActive(dzi) ? "territory.dzi" : null);
  </script>
</body>
</html>
